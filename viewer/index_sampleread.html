<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dita Reader — Sample Read</title>
    <meta charset="utf-8" />
    <meta name="author" content="Aferdita Muriqi" />
    <meta name="description" content="A sample/preview read viewer for EPUB files." />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- Material Icons-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- START R2 Reader CSS and JS -->
    <link rel="stylesheet" href="reader.css" />
    <script src="reader.js"></script>
    <!-- END R2 Reader CSS and JS -->

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Modern toggle switch */
        .toggle-switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-switch .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 22px; transition: .25s; }
        .toggle-switch .slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .25s; }
        .toggle-switch input:checked + .slider { background: #6d28d9; }
        .toggle-switch input:checked + .slider::before { transform: translateX(18px); }

        /* Compact setting row */
        .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px; }
        .setting-row label { font-size: 8.5pt; color: #555; margin: 0; flex-shrink: 0; white-space: nowrap; }
        .setting-row .setting-value { font-size: 8pt; color: #999; min-width: 32px; text-align: right; }
        .setting-row input[type="range"] { flex: 1; margin: 0 8px; height: 3px; -webkit-appearance: none; appearance: none; background: #e0e0e0; border-radius: 2px; outline: none; }
        .setting-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #6d28d9; cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2); }

        /* Segmented control buttons */
        .seg-btn { height: 28px; min-width: 60px; padding: 0 10px; font-size: 8pt; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid #d0d0d0; background: #fff; color: #555; cursor: pointer; transition: all .15s; }
        .seg-btn:hover { background: #f5f5f5; }
        .seg-btn.active, .seg-btn:active { background: #7c3aed; color: #fff; border-color: #6d28d9; }
        .seg-left { border-radius: 16px 0 0 16px; }
        .seg-right { border-radius: 0 16px 16px 0; }

        /* Select dropdown */
        .setting-select { flex: 1; margin-left: 10px; height: 28px; font-size: 8.5pt; border: 1px solid #d0d0d0; border-radius: 6px; padding: 0 8px; background: #fff; color: #555; outline: none; }
        .setting-select:focus { border-color: #6d28d9; }

        /* Reset button */
        .reset-btn { height: 28px; padding: 0 20px; font-size: 8.5pt; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid #6d28d9; border-radius: 14px; background: transparent; color: #6d28d9; cursor: pointer; transition: all .15s; }
        .reset-btn:hover { background: #6d28d9; color: #fff; }

        /* ── Toolbar ── */
        .reader-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            height: 42px; padding: 0 10px;
            background: #fff; border-bottom: 1px solid #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 2px; }
        .toolbar-center { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
        .toolbar-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border: none; background: none;
            color: #333; cursor: pointer; border-radius: 6px; transition: background .15s;
        }
        .toolbar-btn:hover { background: #f0f0f0; }
        .toolbar-btn i { font-size: 20px; }
        .toolbar-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: #7c3aed; color: #fff; border-radius: 10px;
            padding: 2px 10px 2px 6px; font-size: 8pt; font-weight: 600;
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .toolbar-badge i { font-size: 13px; }

        /* ── Sidebars ── */
        .sidebar-overlay {
            display: none; position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,.3); transition: opacity .25s;
        }
        .sidebar-overlay.open { display: block; }

        .sidebar {
            position: fixed; top: 0; z-index: 510; height: 100vh; width: 280px;
            background: #fff; box-shadow: 0 0 20px rgba(0,0,0,.15);
            transform: translateX(-100%); transition: transform .25s ease;
            overflow-y: auto; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .sidebar.sidebar-right { right: 0; left: auto; transform: translateX(100%); }
        .sidebar.open { transform: translateX(0); }

        .sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            height: 42px; padding: 0 14px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff;
            font-size: 11px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
        }
        .sidebar-header button { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.8); display: inline-flex; align-items: center; font-size: 16px; }
        .sidebar-header button:hover { color: #fff; }
        .sidebar-body { padding: 8px 0; overflow-y: auto; flex: 1; }

        /* TOC sidebar — override reader.css defaults */
        .sidebar .contents-view { padding: 0; overflow-y: auto; top: 0; }
        .sidebar .contents-view ol,
        .sidebar .contents-view ul { list-style: none; margin: 0; padding: 0; }
        .sidebar .contents-view li { margin: 0; }
        .sidebar .contents-view li a,
        .sidebar .contents-view li span {
            padding: 7px 14px !important; font-size: 12px !important;
            border-bottom: 1px solid #f0f0f0 !important; color: #444 !important;
            line-height: 1.3 !important;
        }
        .sidebar .contents-view li a:hover { background: #f0f0f0 !important; }
        .sidebar .contents-view li a.active {
            background: #e8e8e8 !important; color: #000 !important;
            font-weight: 600 !important;
        }
        .sidebar .contents-view .sidenav-toc { padding: 0; }
        .sidebar .contents-view .sidenav-toc .chapter-title {
            padding: 4px 14px !important; font-size: 10px !important; color: #bbb !important;
        }
        .sidebar .contents-view ul ul { padding-left: 12px !important; }
        .sidebar .contents-view ul ul li a,
        .sidebar .contents-view ul ul li span {
            font-size: 11px !important; color: #888 !important; padding: 5px 14px !important;
        }

        /* Sample read banner */
        .sample-banner {
            display: flex; align-items: center; justify-content: space-between;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff; padding: 6px 14px; font-size: 9pt; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none; -webkit-user-select: none; z-index: 100;
        }
        .sample-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,.2); border-radius: 12px; padding: 2px 10px 2px 6px;
            font-weight: 600; font-size: 8.5pt; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .sample-badge i { font-size: 14px; }
        .sample-limit { font-size: 8pt; opacity: .9; }

        /* Progress bar */
        .sample-progress-wrap {
            background: rgba(255,255,255,.25); border-radius: 3px; height: 6px;
            flex: 1; margin: 0 12px; max-width: 200px; overflow: hidden;
        }
        .sample-progress-bar {
            height: 100%; width: 0%; background: #fff; border-radius: 3px;
            transition: width .4s ease;
        }

        /* Sample popup overlay */
        .sample-popup-overlay {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,.55); align-items: center; justify-content: center;
        }
        .sample-popup-overlay.visible { display: flex; }
        .sample-popup {
            background: #fff; border-radius: 16px; padding: 32px; max-width: 380px; width: 90%;
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.3); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .sample-popup i.large-icon { font-size: 48px; color: #7c3aed; margin-bottom: 12px; }
        .sample-popup h3 { margin: 0 0 8px; font-size: 16pt; color: #222; }
        .sample-popup p { margin: 0 0 20px; font-size: 10.5pt; color: #666; line-height: 1.5; }
        .sample-popup .cta-btn {
            display: inline-block; padding: 10px 28px; background: #7c3aed; color: #fff;
            border: none; border-radius: 20px; font-size: 10pt; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: background .15s;
        }
        .sample-popup .cta-btn:hover { background: #6d28d9; }
    </style>

</head>

<body>

    <div class="content" id="root">
        <header id="headerMenu">

            <!-- TOC Sidebar (left) -->
            <div class="sidebar" id="tocSidebar">
                <div class="sidebar-header">
                    <span>Table of Contents</span>
                    <button onclick="toggleTocSidebar()"><i class="material-icons" style="font-size:20px">close</i></button>
                </div>
                <div class="sidebar-body">
                    <div id="container-view-toc" class="contents-view"></div>
                </div>
            </div>

            <!-- Settings Sidebar (right) -->
            <div class="sidebar sidebar-right" id="settingsSidebar">
                <div class="sidebar-header">
                    <span>Reader Settings</span>
                    <button onclick="toggleSettingsSidebar()"><i class="material-icons" style="font-size:20px">close</i></button>
                </div>
                <div class="sidebar-body">
                    <div id="container-view-settings-custom" class="settings-view"
                         style="width: 100%; padding: 8px 0;">

                        <!-- Font Size -->
                        <div class="setting-row">
                            <label>Font Size</label>
                            <input type="range" min="100" max="300" step="25" value="100" id="fontSize"
                                   oninput="document.getElementById('fontSizeValue').textContent = this.value + '%'"
                                   onchange="d2reader.applyUserSettings({ fontSize: this.value })"/>
                            <span class="setting-value" id="fontSizeValue">100%</span>
                        </div>

                        <!-- Font Family -->
                        <div class="setting-row">
                            <label>Font</label>
                            <select id="fontFamily" class="setting-select"
                                    onchange="d2reader.applyUserSettings({fontFamily:value});reload();">
                                <option value="Original">Publisher</option>
                                <option value="serif">Serif</option>
                                <option value="sans-serif">Sans-serif</option>
                                <option value="opendyslexic">Open Dyslexic</option>
                            </select>
                        </div>

                        <div style="border-top: 1px solid #eee; margin: 6px 12px;"></div>

                        <!-- Appearance -->
                        <div id="appearance" class="setting-row" style="justify-content: center; gap: 0;">
                            <button class="seg-btn seg-left" onclick="d2reader.applyUserSettings({appearance:'day'});setAppearance('day')" style="background:#fff;color:#000;">Day</button><button class="seg-btn seg-right" onclick="d2reader.applyUserSettings({appearance:'night'});setAppearance('night')" style="background:#121212;color:#fff;">Night</button>
                        </div>

                        <!-- Layout -->
                        <div id="scrollMode" class="setting-row" style="justify-content: center; gap: 0;">
                            <button class="seg-btn seg-left" onclick="d2reader.applyUserSettings({verticalScroll:true});setScroll('true')">Scroll</button><button class="seg-btn seg-right" onclick="d2reader.applyUserSettings({verticalScroll:false});setScroll('false')">Paginated</button>
                        </div>

                        <div style="border-top: 1px solid #eee; margin: 6px 12px;"></div>

                        <!-- Line Height -->
                        <div class="setting-row">
                            <label>Line Height</label>
                            <input type="range" min="1" max="2" step="0.25" value="1" id="lineHeight"
                                   oninput="document.getElementById('lineHeightValue').textContent = this.value"
                                   onchange="d2reader.applyUserSettings({ lineHeight: this.value })"/>
                            <span class="setting-value" id="lineHeightValue">1</span>
                        </div>

                        <!-- Page Margins -->
                        <div class="setting-row">
                            <label>Page Margins</label>
                            <input type="range" min="0.5" max="4" step="0.25" value="1" id="pageMargins"
                                   oninput="document.getElementById('pageMarginsValue').textContent = this.value"
                                   onchange="d2reader.applyUserSettings({ pageMargins: this.value })"/>
                            <span class="setting-value" id="pageMarginsValue">1</span>
                        </div>

                        <div style="border-top: 1px solid #eee; margin: 6px 12px;"></div>

                        <!-- Reset -->
                        <div class="setting-row" style="justify-content: center; padding: 8px 12px;">
                            <button class="reset-btn" onclick="d2reader.resetUserSettings().then(()=>reload());">Reset</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar overlay -->
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeAllSidebars()"></div>

            <!-- Sample read banner -->
            <div class="sample-banner" id="sampleBanner">
                <span class="sample-badge"><i class="material-icons">lock</i> Sample Read</span>
                <div class="sample-progress-wrap">
                    <div class="sample-progress-bar" id="sampleProgressBar"></div>
                </div>
                <span class="sample-limit" id="sampleLimitLabel">0 / 10% read</span>
            </div>

            <!-- Toolbar -->
            <div class="reader-toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" onclick="toggleTocSidebar()" title="Table of Contents"><i class="material-icons">menu</i></button>
                    <span class="toolbar-badge"><i class="material-icons">lock</i> Sample</span>
                </div>
                <div class="toolbar-center">
                    <button class="toolbar-btn" onclick="d2reader.previousPage()" title="Previous page"><i class="material-icons">arrow_back_ios</i></button>
                    <button class="toolbar-btn" onclick="d2reader.nextPage()" title="Next page"><i class="material-icons">arrow_forward_ios</i></button>
                </div>
                <div class="toolbar-right">
                    <button class="toolbar-btn" onclick="toggleSettingsSidebar();reload()" id="menu-button-settings" title="Settings"><i class="material-icons">settings</i></button>
                </div>
            </div>

        </header>

        <div id="D2Reader-Container" style="height: calc(100vh - 76px);">
            <main style="height: calc(100vh - 76px);" tabindex=-1 id="iframe-wrapper">
                <div id="reader-loading" class="loading"></div>
                <div id="reader-error" class="error"></div>
                <div id="reader-info-top" class="info top">
                    <span class="book-title"></span>
                </div>
                <div id="reader-info-bottom" class="info bottom">
                    <div style="display: flex;justify-content: center;">
                        <span class="chapter-position"></span>&nbsp;
                        <span class="chapter-title"></span>
                    </div>
                    <div class="scrubber">
                        <input class="range-slider__range" style="width:100%" type="range" min="1" step="1" id="positionSlider" name="positionSlider" onchange="d2reader.goToPosition( this.value )" />
                    </div>
                    <div>
                        <span class="remaining-positions"></span>
                    </div>
                </div>
            </main>
            <div id="container-view-security" class="security"></div>
            <div id="container-view-timeline" class="timeline" style="top: 5rem;bottom: 2.5rem;"></div>
            <a id="previous-chapter" rel="prev" role="button" aria-labelledby="previous-label"
               style="top: 76px;left: 50%;position: fixed;color: #000;height: 24px;background: #d3d3d33b; width: 150px;transform: translate(-50%, 0); display: none">
                <i class="material-icons black-text" style="left: calc(50% - 12px);
                position: relative;">keyboard_arrow_up</i>
            </a>
            <a id="next-chapter" rel="next" role="button" aria-labelledby="next-label" style="bottom: 0;left: 50%;position: fixed;color: #000;height: 24px;background: #d3d3d33b; width: 150px;transform: translate(-50%, 0); display: none">
                <i class="material-icons black-text" style="left: calc(50% - 12px);
                position: relative;">keyboard_arrow_down</i>
            </a>
            <div class="left-gutter" id="left-gutter"></div>
        </div>

    </div>

    <footer id="footerMenu">
        <a rel="prev" class="disabled" role="button" aria-labelledby="previous-label" style="top: 50%;left:0;position: fixed;height: 100px;
                    background: #d3d3d33b;">
            <i class="material-icons black-text" style="top: calc(50% - 12px);
                        position: relative;">keyboard_arrow_left</i>
        </a>
        <a rel="next" class="disabled" role="button" aria-labelledby="next-label" style="top: 50%;right:0;position: fixed;height: 100px;
                    background: #d3d3d33b;">
            <i class="material-icons black-text" style="top: calc(50% - 12px);
                        position: relative;">keyboard_arrow_right</i>
        </a>
    </footer>

    <!-- Sample limit popup overlay -->
    <div class="sample-popup-overlay" id="samplePopupOverlay">
        <div class="sample-popup">
            <i class="material-icons large-icon">menu_book</i>
            <h3>Sample Limit Reached</h3>
            <p id="samplePopupMessage">You can borrow the book to continue reading.</p>
            <a class="cta-btn" id="samplePopupCta" href="#">Get Full Access</a>
        </div>
    </div>

    <script>
        /* ── Sidebar toggle logic ── */
        function toggleTocSidebar() {
            let toc = document.getElementById('tocSidebar');
            let settings = document.getElementById('settingsSidebar');
            let overlay = document.getElementById('sidebarOverlay');
            let isOpen = toc.classList.contains('open');
            settings.classList.remove('open');
            toc.classList.toggle('open', !isOpen);
            overlay.classList.toggle('open', !isOpen);
        }

        function toggleSettingsSidebar() {
            let settings = document.getElementById('settingsSidebar');
            let toc = document.getElementById('tocSidebar');
            let overlay = document.getElementById('sidebarOverlay');
            let isOpen = settings.classList.contains('open');
            toc.classList.remove('open');
            settings.classList.toggle('open', !isOpen);
            overlay.classList.toggle('open', !isOpen);
        }

        function closeAllSidebars() {
            document.getElementById('tocSidebar').classList.remove('open');
            document.getElementById('settingsSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        }

        /* ── Query params ── */
        let getURLQueryParams = function () {
            let params = {};
            let query = window.location.search;
            if (query && query.length) {
                query = query.substring(1);
                let keyParams = query.split('&');
                for (let x = 0; x < keyParams.length; x++) {
                    let keyVal = keyParams[x].split('=');
                    if (keyVal.length > 1) {
                        params[keyVal[0]] = decodeURIComponent(keyVal[1]);
                    }
                }
            }
            return params;
        };
        let urlParams = getURLQueryParams();

        /* ── Sample read config ── */
        let sampleLimit = 10;
        let sampleMinimum = 5;
        let samplePopupText = "You can borrow the book to continue reading.";
        let currentProgress = 0;

        function updateSampleProgress(percent) {
            currentProgress = Math.min(percent, 100);
            let bar = document.getElementById('sampleProgressBar');
            let label = document.getElementById('sampleLimitLabel');
            if (bar) bar.style.width = currentProgress + '%';
            if (label) label.textContent = Math.round(currentProgress) + ' / ' + sampleLimit + '% read';
        }

        /* ── Injectables ── */
        let injectables = [
            { type: 'style', url: '/viewer/readium-css/ReadiumCSS-before.css', r2before: true },
            { type: 'style', url: '/viewer/readium-css/ReadiumCSS-default.css', r2default: true },
            { type: 'style', url: '/viewer/readium-css/ReadiumCSS-after.css', r2after: true },
            { type: 'script', url: 'https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.6/MathJax.js?config=TeX-MML-AM_CHTML&latest' },
            { type: 'style', url: '/viewer/fonts/opendyslexic/opendyslexic.css', fontFamily: 'opendyslexic' },
            { type: 'style', fontFamily: 'Courier', systemFont: true },
            { type: 'style', url: '/viewer/injectables/style/style.css' },
        ]

        let userSettings = {}

        let selectionMenuItems = [
            {
                id: 'anIcon',
                callback: function (selection) {
                    alert(selection)
                }
            }
        ]

        /* ── Load reader ── */
        let d2reader;
        D2Reader.load({
            url: new URL(urlParams['url']),
            attributes: {
                margin: 120,
                navHeight: 76,
                iframePaddingTop: 20,
                bottomInfoHeight: 60,
                sideNavPosition: 'right'
            },
            rights: {
                enableMaterial: true,
                enableBookmarks: false,
                enableAnnotations: false,
                enableTTS: false,
                enableSearch: false,
                enableTimeline: false,
                enableContentProtection: false,
                enableMediaOverlays: false,
                autoGeneratePositions: true,
            },
            sample: {
                isSampleRead: true,
                limit: sampleLimit,
                minimum: sampleMinimum,
                popup: samplePopupText
            },
            highlighter: {
                selectionMenuItems: selectionMenuItems,
                api: {
                    selectionMenuOpen: function () {
                        console.log("selectionMenuOpen")
                    },
                    selectionMenuClose: function () {
                        console.log("selectionMenuClose")
                    },
                }
            },
            protection: {
                enforceSupportedBrowsers: true,
                enableEncryption: true,
                enableObfuscation: true,
                disablePrint: true,
                disableCopy: true,
                detectInspect: false,
                clearOnInspect: true,
                disableKeys: true,
                disableContextMenu: true,
                hideTargetUrl: true,
                disableDrag: false,
                supportedBrowsers: [
                    "Chrome", "ChromeAndroid", "Edge", "Firefox", "iOS", "Safari"
                ],
                api: {
                    inspectDetected: function () {
                        console.log("inspect detected")
                    }
                }
            },
            consumption: {
                enableTrackingSession: true,
                api: {
                    startResearchSession: function (session) {
                        console.log("startResearchSession", session);
                        return session;
                    },
                    updateResearchSession: function (session) {
                        console.log("updateResearchSession", session);
                    },
                    endResearchSession: function (session) {
                        console.log("endResearchSession", session);
                    }
                }
            },
            api: {
                getContent: function (href) {
                    console.log("getContent")
                    return new Promise(function (resolve, reject) {
                        resolve()
                    })
                },
                resourceReady: function () {
                    console.log("resourceReady")
                },
                resourceAtStart: function () {
                    console.log("resourceAtStart")
                },
                resourceAtEnd: function () {
                    console.log("resourceAtEnd")
                },
                resourceFitsScreen: function () {
                    console.log("resourceFitsScreen")
                },
                updateCurrentLocation: function (location) {
                    console.log("updateCurrentLocation", location)

                    // Update sample progress from location data
                    if (location && location.locations && location.locations.totalProgression != null) {
                        let progressPercent = (location.locations.totalProgression * 100);
                        updateSampleProgress((progressPercent / sampleLimit) * 100);

                        // Show popup when sample limit is reached
                        if (progressPercent >= sampleLimit) {
                            document.getElementById('samplePopupOverlay').classList.add('visible');
                        }
                    }

                    return new Promise(function (resolve, reject) {
                        resolve(location)
                    })
                },
                updateSettings: function (settings) {
                    console.log("updateSettings")
                    return new Promise(function (resolve, reject) {
                        resolve(settings)
                    })
                }
            },
            injectables: injectables,
            injectablesFixed: [],
            userSettings: userSettings,
            useLocalStorage: true
        }).then(instance => {
            console.log("d2Reader loaded ", instance);
            d2reader = instance;

            // Set popup message text
            document.getElementById('samplePopupMessage').textContent = samplePopupText;
        }).catch(error => {
            console.error("error.message ", error.message);
            document.getElementById("reader-error").innerText = error.message
        });

        /* ── Settings helpers ── */
        function setAppearance(mode) {
            let buttons = document.getElementById('appearance').getElementsByTagName('button');
            for (let b of buttons) b.classList.remove('active');
            if (mode === 'day') buttons[0].classList.add('active');
            else if (mode === 'night') buttons[1].classList.add('active');
        }

        function setScroll(scroll) {
            let buttons = document.getElementById('scrollMode').getElementsByTagName('button');
            for (let b of buttons) b.classList.remove('active');
            if (scroll === 'true') buttons[0].classList.add('active');
            else if (scroll === 'false') buttons[1].classList.add('active');
        }

        function reload() {
            let result = d2reader.currentSettings;
            document.getElementById("fontSize").value = result['fontSize'];
            document.getElementById("fontSizeValue").textContent = result['fontSize'] + '%';
            document.getElementById("fontFamily").value = result['fontFamily'];

            let scrollMode = result['verticalScroll'];
            setScroll(String(scrollMode).toLowerCase());
        }

        /* ── Keyboard navigation ── */
        document.addEventListener('keydown', function (e) {
            if (!d2reader) return;
            switch (e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    d2reader.previousPage();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    d2reader.nextPage();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    d2reader.previousPage();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    d2reader.nextPage();
                    break;
            }
        });

        /* ── Dismiss sample popup on overlay click ── */
        document.getElementById('samplePopupOverlay').addEventListener('click', function (e) {
            if (e.target === this) {
                this.classList.remove('visible');
            }
        });
    </script>
